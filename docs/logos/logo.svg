<svg width="600" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="200" fill="#1a1b26" rx="10"/>

  <!-- Gradient for accent -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7aa2f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bb9af7;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main text: testmcpy -->
  <text x="50" y="100" font-family="'Courier New', monospace" font-size="64" font-weight="bold" fill="url(#grad1)">testmcpy</text>

  <!-- Underline accent -->
  <line x1="50" y1="110" x2="450" y2="110" stroke="url(#grad1)" stroke-width="4"/>

  <!-- Test tube icon -->
  <g transform="translate(500, 50)">
    <rect x="0" y="20" width="30" height="50" rx="5" fill="none" stroke="#7aa2f7" stroke-width="3"/>
    <rect x="5" y="45" width="20" height="25" fill="#7aa2f7" opacity="0.3"/>
    <circle cx="15" cy="15" r="8" fill="none" stroke="#7aa2f7" stroke-width="2"/>
    <line x1="15" y1="15" x2="15" y2="20" stroke="#7aa2f7" stroke-width="2"/>
  </g>

  <!-- Checkmark icon -->
  <g transform="translate(560, 50)">
    <circle cx="15" cy="35" r="20" fill="none" stroke="#9ece6a" stroke-width="3"/>
    <path d="M 8 35 L 13 40 L 23 28" fill="none" stroke="#9ece6a" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Subtitle -->
  <text x="50" y="145" font-family="'Courier New', monospace" font-size="18" fill="#a9b1d6">MCP Testing Framework</text>

  <!-- Tags -->
  <text x="50" y="175" font-family="'Courier New', monospace" font-size="14" fill="#565f89">
    <tspan fill="#7aa2f7">🧪</tspan> Test
    <tspan fill="#565f89">•</tspan>
    <tspan fill="#bb9af7">📊</tspan> Benchmark
    <tspan fill="#565f89">•</tspan>
    <tspan fill="#9ece6a">✓</tspan> Validate
  </text>
</svg>
