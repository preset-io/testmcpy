version: "1.0"
tests:
  - name: test_basic_health_check
    prompt: "Check if the service is running and healthy"
    evaluators:
      - name: execution_successful
      - name: was_mcp_tool_called
        args:
          tool_name: "health_check"
  - name: test_system_status_request
    prompt: "Can you tell me the current status of the system?"
    evaluators:
      - name: execution_successful
      - name: was_mcp_tool_called
        args:
          tool_name: "health_check"
  - name: test_service_availability
    prompt: "Is the MCP service available and responding?"
    evaluators:
      - name: execution_successful
      - name: was_mcp_tool_called
        args:
          tool_name: "health_check"
  - name: test_connectivity_verification
    prompt: "Verify that I can connect to the service"
    evaluators:
      - name: execution_successful
      - name: was_mcp_tool_called
        args:
          tool_name: "health_check"
  - name: test_ping_service
    prompt: "Ping the service to make sure it's working"
    evaluators:
      - name: execution_successful
      - name: was_mcp_tool_called
        args:
          tool_name: "health_check"