version: "1.0"
tests:
  - name: test_basic_list_all_charts
    prompt: "Show me all available charts in the system"
    evaluators:
      - name: execution_successful
      - name: was_mcp_tool_called
        args:
          tool_name: "list_charts"
      - name: tool_called_with_parameters
        args:
          tool_name: "list_charts"
          parameters:
            request:
              page: 1
              page_size: 10
          partial_match: true

  - name: test_search_charts_by_name
    prompt: "Search for charts with 'sales' in their name"
    evaluators:
      - name: execution_successful
      - name: was_mcp_tool_called
        args:
          tool_name: "list_charts"
      - name: tool_called_with_parameters
        args:
          tool_name: "list_charts"
          parameters:
            request:
              search: "sales"
          partial_match: true

  - name: test_filter_by_visualization_type
    prompt: "List all bar charts in the system"
    evaluators:
      - name: execution_successful
      - name: was_mcp_tool_called
        args:
          tool_name: "list_charts"
      - name: tool_called_with_parameters
        args:
          tool_name: "list_charts"
          parameters:
            request:
              filters:
                - col: "viz_type"
                  opr: "eq"
                  value: "bar"
          partial_match: true

  - name: test_pagination_and_ordering
    prompt: "Get the top 20 most recently created charts, ordered by creation date descending"
    evaluators:
      - name: execution_successful
      - name: was_mcp_tool_called
        args:
          tool_name: "list_charts"
      - name: tool_called_with_parameters
        args:
          tool_name: "list_charts"
          parameters:
            request:
              page_size: 20
              order_column: "created_on"
              order_direction: "desc"
          partial_match: true

  - name: test_multiple_filters_with_caching
    prompt: "Find all pie charts from the 'marketing' datasource, and refresh the cache to get the latest data"
    evaluators:
      - name: execution_successful
      - name: was_mcp_tool_called
        args:
          tool_name: "list_charts"
      - name: tool_called_with_parameters
        args:
          tool_name: "list_charts"
          parameters:
            request:
              filters:
                - col: "viz_type"
                  opr: "eq"
                  value: "pie"
                - col: "datasource_name"
                  opr: "eq"
                  value: "marketing"
              force_refresh: true
          partial_match: true