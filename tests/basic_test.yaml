version: "1.0"
name: "Basic MCP Tool Test"
description: "Simple test to verify MCP tool calling works"

tests:
  - name: "test_simple_tool_call"
    prompt: "List datasets"
    evaluators:
      - name: "was_mcp_tool_called"
        args:
          tool_name: "list_datasets"
      - name: "execution_successful"
      - name: "within_time_limit"
        args:
          max_seconds: 10