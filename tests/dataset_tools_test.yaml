version: "1.0"
name: "Dataset Tools - Schema Documentation Quality Tests"
description: "Tests whether the tool descriptions and schemas provide sufficient guidance for the LLM to make correct tool calls"

tests:
  # Test 1: Basic tool selection - does description guide LLM to right tool?
  - name: "test_list_vs_get_tool_selection"
    prompt: "List datasets"
    timeout: 10
    evaluators:
      - name: "was_mcp_tool_called"
        args:
          tool_name: "list_datasets"  # Should pick list_datasets, not get_dataset_info
      - name: "execution_successful"

  # Test 2: Parameter inference - can LLM infer correct parameters from schema?
  - name: "test_search_parameter_inference"
    prompt: "Find datasets with 'sales' in the name"
    timeout: 10
    evaluators:
      - name: "was_mcp_tool_called"
        args:
          tool_name: "list_datasets"  # Should use search parameter from schema
      - name: "execution_successful"

  # Test 3: Required vs optional parameters - does schema make this clear?
  - name: "test_minimal_required_params"
    prompt: "Get information about dataset ID 1"
    timeout: 15
    evaluators:
      - name: "was_mcp_tool_called"
        args:
          tool_name: "get_dataset_info"  # Should only pass required 'identifier' param
      - name: "execution_successful"

  # Test 4: Tool purpose clarity - description guides to correct tool choice
  - name: "test_filter_discovery_tool_choice"
    prompt: "What filtering options are available for datasets?"
    timeout: 10
    evaluators:
      - name: "was_mcp_tool_called"
        args:
          tool_name: "get_dataset_available_filters"  # Not list_datasets
      - name: "execution_successful"

  # Test 5: Complex parameter mapping - can LLM map natural language to schema fields?
  - name: "test_ordering_parameter_mapping"
    prompt: "Show me datasets ordered by name ascending"
    timeout: 10
    evaluators:
      - name: "was_mcp_tool_called"
        args:
          tool_name: "list_datasets"  # Should map to order_column and order_direction params
      - name: "execution_successful"

  # Test 6: Error-prone scenario - distinguishing similar tools
  - name: "test_list_vs_info_distinction"
    prompt: "Get details about all datasets"
    timeout: 15
    evaluators:
      - name: "was_mcp_tool_called"
        args:
          tool_name: "list_datasets"  # Should choose list (all) not get_dataset_info (specific)
      - name: "execution_successful"

  # Test 7: Multi-step workflow - can LLM chain tools appropriately?
  - name: "test_workflow_tool_chaining"
    prompt: "First list all datasets, then get detailed info about dataset 1"
    timeout: 20
    evaluators:
      - name: "execution_successful"  # Should call list_datasets then get_dataset_info

  # Test 8: Parameter type handling - boolean, enum, etc.
  - name: "test_cache_parameter_handling"
    prompt: "List datasets with fresh data from the database"
    timeout: 15
    evaluators:
      - name: "was_mcp_tool_called"
        args:
          tool_name: "list_datasets"  # Should set force_refresh=true from schema
      - name: "execution_successful"

  # Test 9: Edge case - empty/minimal requests
  - name: "test_minimal_request_handling"
    prompt: "Show datasets"
    timeout: 10
    evaluators:
      - name: "was_mcp_tool_called"
        args:
          tool_name: "list_datasets"  # Should work with default parameters
      - name: "execution_successful"

  # Test 10: Disambiguation - when request could match multiple tools
  - name: "test_tool_disambiguation"
    prompt: "What information can you give me about datasets?"
    timeout: 15
    evaluators:
      - name: "execution_successful"  # Should pick the most appropriate tool(s)