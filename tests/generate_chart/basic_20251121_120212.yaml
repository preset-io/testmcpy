version: "1.0"
tests:
  - name: test_xy_chart_with_aggregation
    prompt: "Create a line chart showing total sales by month. Use the sales dataset and aggregate revenue by summing it, grouped by order date."
    evaluators:
      - name: execution_successful
      - name: was_mcp_tool_called
        args:
          tool_name: "generate_chart"
      - name: tool_called_with_parameters
        args:
          tool_name: "generate_chart"
          parameters:
            request:
              config:
                chart_type: "xy"
                kind: "line"
              save_chart: true
          partial_match: true
      - name: response_includes
        args:
          text: "preview_url"

  - name: test_table_chart_with_filters
    prompt: "Generate a data table showing customer names, email addresses, and total purchase amounts for customers in the US region only. Save this chart permanently."
    evaluators:
      - name: execution_successful
      - name: was_mcp_tool_called
        args:
          tool_name: "generate_chart"
      - name: tool_called_with_parameters
        args:
          tool_name: "generate_chart"
          parameters:
            request:
              config:
                chart_type: "table"
                columns:
                  - minItems: 1
              save_chart: true
          partial_match: true
      - name: response_includes
        args:
          text: "chart_id"