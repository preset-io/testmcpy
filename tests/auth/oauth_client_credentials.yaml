version: "1.0"
name: "OAuth Client Credentials Flow Tests"
description: >
  Tests for OAuth 2.0 Client Credentials Grant (RFC 6749 Section 4.4).
  Validates successful auth flows, token format, and error handling.

# Required environment variables:
#   OAUTH_CLIENT_ID, OAUTH_CLIENT_SECRET, OAUTH_TOKEN_URL
#
# Run with: testmcpy run tests/auth/oauth_client_credentials.yaml --mcp-url <url> --verbose

tests:
  # ============================================================================
  # Happy Path Tests
  # ============================================================================

  - name: "test_oauth_valid_credentials"
    description: "Verify OAuth client credentials flow succeeds with valid credentials"
    auth_only: true
    auth:
      type: oauth
      client_id: ${OAUTH_CLIENT_ID}
      client_secret: ${OAUTH_CLIENT_SECRET}
      token_url: ${OAUTH_TOKEN_URL}
      scopes: ["openid", "email", "profile"]
    evaluators:
      - name: "auth_successful"
      - name: "token_valid"
        args:
          format: "jwt"
          min_length: 100
      - name: "oauth2_flow_complete"

  - name: "test_oauth_token_is_jwt"
    description: "Validate OAuth token is a properly structured JWT with valid header"
    auth_only: true
    auth:
      type: oauth
      client_id: ${OAUTH_CLIENT_ID}
      client_secret: ${OAUTH_CLIENT_SECRET}
      token_url: ${OAUTH_TOKEN_URL}
      scopes: ["openid"]
    evaluators:
      - name: "auth_successful"
      - name: "token_valid"
        args:
          format: "jwt"
      - name: "jwt_claims_valid"
        args:
          check_header: true
          check_exp: true

  - name: "test_oauth_token_expiration"
    description: "Verify OAuth token has a valid expiration claim in the future"
    auth_only: true
    auth:
      type: oauth
      client_id: ${OAUTH_CLIENT_ID}
      client_secret: ${OAUTH_CLIENT_SECRET}
      token_url: ${OAUTH_TOKEN_URL}
    evaluators:
      - name: "auth_successful"
      - name: "token_valid"
        args:
          format: "jwt"
          check_expiration: true

  - name: "test_oauth_token_claims"
    description: "Validate standard JWT claims (iss, sub, exp, iat) are present"
    auth_only: true
    auth:
      type: oauth
      client_id: ${OAUTH_CLIENT_ID}
      client_secret: ${OAUTH_CLIENT_SECRET}
      token_url: ${OAUTH_TOKEN_URL}
    evaluators:
      - name: "auth_successful"
      - name: "jwt_claims_valid"
        args:
          check_exp: true
          check_iat: true
          check_header: true

  - name: "test_oauth_minimal_scopes"
    description: "Test OAuth with minimal scope requirements"
    auth_only: true
    auth:
      type: oauth
      client_id: ${OAUTH_CLIENT_ID}
      client_secret: ${OAUTH_CLIENT_SECRET}
      token_url: ${OAUTH_TOKEN_URL}
      scopes: ["openid"]
    evaluators:
      - name: "auth_successful"
      - name: "oauth2_flow_complete"

  # ============================================================================
  # Error Handling Tests
  # ============================================================================

  - name: "test_oauth_invalid_client_id"
    description: "Verify proper error handling for invalid OAuth client ID"
    auth_only: true
    auth:
      type: oauth
      client_id: "invalid-client-id-00000"
      client_secret: ${OAUTH_CLIENT_SECRET}
      token_url: ${OAUTH_TOKEN_URL}
    evaluators:
      # RFC 6749 Section 5.2: error response for invalid_client
      # Note: HTTP 400 (not 401) for client_secret_post auth method
      - name: "auth_error_handling"
        args:
          min_length: 10

  - name: "test_oauth_invalid_client_secret"
    description: "Verify proper error handling for invalid OAuth client secret"
    auth_only: true
    auth:
      type: oauth
      client_id: ${OAUTH_CLIENT_ID}
      client_secret: "invalid-secret-00000"
      token_url: ${OAUTH_TOKEN_URL}
    evaluators:
      - name: "auth_error_handling"
        args:
          min_length: 10

  - name: "test_oauth_malformed_token_url"
    description: "Test error handling for malformed OAuth token URL"
    auth_only: true
    auth:
      type: oauth
      client_id: ${OAUTH_CLIENT_ID}
      client_secret: ${OAUTH_CLIENT_SECRET}
      token_url: "not-a-valid-url"
    evaluators:
      - name: "auth_error_handling"
        args:
          min_length: 5

  - name: "test_oauth_unreachable_token_url"
    description: "Test timeout handling for unreachable OAuth token URL"
    auth_only: true
    timeout: 30
    auth:
      type: oauth
      client_id: ${OAUTH_CLIENT_ID}
      client_secret: ${OAUTH_CLIENT_SECRET}
      token_url: "https://192.0.2.1/oauth/token"
    evaluators:
      - name: "auth_error_handling"
        args:
          min_length: 5

  - name: "test_oauth_nonexistent_scopes"
    description: "Test error handling when requesting scopes that don't exist"
    auth_only: true
    auth:
      type: oauth
      client_id: ${OAUTH_CLIENT_ID}
      client_secret: ${OAUTH_CLIENT_SECRET}
      token_url: ${OAUTH_TOKEN_URL}
      scopes: ["nonexistent_scope_xyz"]
    evaluators:
      # Server may either reject with invalid_scope or grant reduced scopes
      - name: "auth_error_handling"
        args:
          min_length: 5
