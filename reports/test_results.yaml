    a copy of the License at\\n\\n  http://www.apache.org/licenses/LICENSE-2.0\\n\\nUnless
    required by applicable law or agreed to in writing,\\nsoftware distributed under
    the License is distributed on an\\n\\"AS IS\\" BASIS, WITHOUT WARRANTIES OR CONDITIONS
    OF ANY\\nKIND, either express or implied.  See the License for the\\nspecific
    language governing permissions and limitations\\nunder the License.\\n-->\\nThis
    data was downloaded from the\\n[World\''s Health Organization\''s website](https://datacatalog.worldbank.org/dataset/health-nutrition-and-population-statistics)\\n\\nHere\''s
    the script that was used to massage the data:\\n\\n    DIR = \\"\\"\\n    df_country
    = pd.read_csv(DIR + \''/HNP_Country.csv\'')\\n    df_country.columns = [\''country_code\'']
    + list(df_country.columns[1:])\\n    df_country = df_country[[\''country_code\'',
    \''Region\'']]\\n    df_country.columns = [\''country_code\'', \''region\'']\\n\\n    df
    = pd.read_csv(DIR + \''/HNP_Data.csv\'')\\n    del df[\''Unnamed: 60\'']\\n    df.columns
    = [\''country_name\'', \''country_code\''] + list(df.columns[2:])\\n    ndf =
    df.merge(df_country, how=\''inner\'')\\n\\n    dims = (\''country_name\'', \''country_code\'',
    \''region\'')\\n    vv = [str(i) for i in range(1960, 2015)]\\n    mdf = pd.melt(ndf,
    id_vars=dims + (\''Indicator Code\'',), value_vars=vv)\\n    mdf[\''year\''] =
    mdf.variable + \''-01-01\''\\n    dims = dims + (\''year\'',)\\n\\n    pdf = mdf.pivot_table(values=\''value\'',
    columns=\''Indicator Code\'', index=dims)\\n    pdf = pdf.reset_index()\\n    pdf.to_csv(DIR
    + \''/countries.csv\'')\\n    pdf.to_json(DIR + \''/countries.json\'', orient=\''records\'')\\n\\nHere\''s
    the description of the metrics available:\\n\\nSeries | Code Indicator Name\\n---
    | ---\\nNY.GNP.PCAP.CD | GNI per capita, Atlas method (current US$)\\nSE.ADT.1524.LT.FM.ZS
    | Literacy rate, youth (ages 15-24), gender parity index (GPI)\\nSE.ADT.1524.LT.MA.ZS
    | Literacy rate, youth male (% of males ages 15-24)\\nSE.ADT.1524.LT.ZS | Literacy
    rate, youth total (% of people ages 15-24)\\nSE.ADT.LITR.FE.ZS | Literacy rate,
    adult female (% of females ages 15 and above)\\nSE.ADT.LITR.MA.ZS | Literacy rate,
    adult male (% of males ages 15 and above)\\nSE.ADT.LITR.ZS | Literacy rate, adult
    total (% of people ages 15 and above)\\nSE.ENR.ORPH | Ratio of school attendance
    of orphans to school attendance of non-orphans ages 10-14\\nSE.PRM.CMPT.FE.ZS
    | Primary completion rate, female (% of relevant age group)\\nSE.PRM.CMPT.MA.ZS
    | Primary completion rate, male (% of relevant age group)\\nSE.PRM.CMPT.ZS | Primary
