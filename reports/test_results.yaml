    tertiary, female (% gross)\\nSE.XPD.TOTL.GD.ZS | Government expenditure on education,
    total (% of GDP)\\nSH.ANM.CHLD.ZS | Prevalence of anemia among children (% of
    children under 5)\\nSH.ANM.NPRG.ZS | Prevalence of anemia among non-pregnant women
    (% of women ages 15-49)\\nSH.CON.1524.FE.ZS | Condom use, population ages 15-24,
    female (% of females ages 15-24)\\nSH.CON.1524.MA.ZS | Condom use, population
