# MCP Service Configuration
# Credentials use ${VAR} substitution — safe to commit.
# Set env vars via your environment config or .env (gitignored).

default: local

profiles:
  # Local MCP server — points at MCP_SERVER_URL env var.
  local:
    name: Local MCP
    mcps:
      - name: Local MCP Server
        mcp_url: ${MCP_SERVER_URL}
        auth:
          type: none

global:
  timeout: 30
  rate_limit:
    requests_per_minute: 60
