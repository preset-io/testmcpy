name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v0.1.0

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    
    - name: Build package
      run: python -m build
    
    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: python -m twine upload dist/*
    
    - name: Wait for PyPI to process
      run: sleep 10
    
    - name: Download from PyPI and calculate SHA256
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        curl -sL -o "testmcpy-${VERSION}.tar.gz" "https://files.pythonhosted.org/packages/source/t/testmcpy/testmcpy-${VERSION}.tar.gz"
        SHA256=$(sha256sum "testmcpy-${VERSION}.tar.gz" | awk '{print $1}')
        echo "SHA256=${SHA256}" >> $GITHUB_ENV
        echo "VERSION=${VERSION}" >> $GITHUB_ENV

    - name: Update Homebrew formula
      run: |
        sed -i "s/sha256 \".*\"/sha256 \"${SHA256}\"/" Formula/testmcpy.rb
        sed -i "s/testmcpy-[0-9]\+\.[0-9]\+\.[0-9]\+\.tar\.gz/testmcpy-${VERSION}.tar.gz/" Formula/testmcpy.rb

    - name: Commit formula update
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add Formula/testmcpy.rb
        git commit -m "Update Homebrew formula SHA256 for v${VERSION}" || echo "No changes to commit"
    
    - name: Push changes
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: ${{ github.ref }}
