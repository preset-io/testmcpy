name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,server]"

      - name: Lint with ruff
        run: |
          ruff check testmcpy unit_tests integration_tests
          ruff format --check testmcpy unit_tests integration_tests

      - name: Type check with mypy
        run: mypy testmcpy
        continue-on-error: true

      - name: Run tests with pytest
        run: pytest unit_tests/ --cov=testmcpy --cov-report=xml --cov-report=term

      - name: Run integration tests
        run: python -m pytest integration_tests/ -v --tb=short -m "not e2e"
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  ui:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: testmcpy/ui/package-lock.json

      - name: Install UI dependencies
        run: cd testmcpy/ui && npm ci

      - name: Build UI
        run: cd testmcpy/ui && npm run build

      - name: Test UI
        run: cd testmcpy/ui && npm test
        continue-on-error: true
